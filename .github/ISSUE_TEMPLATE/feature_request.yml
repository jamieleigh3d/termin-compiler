name: Feature request
description: Propose a new capability or change to the DSL, compiler, runtime, or toolchain.
title: "[feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Termin is deliberately narrow. Proposals that expand the expressive surface at the cost of structural security guarantees will get a lot of scrutiny. The more concrete your use case, the better the conversation.

        For language or IR schema changes specifically, expect to be asked for a conformance test proposal alongside.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case, not the solution. What would you be building if you had this feature?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What would the DSL, IR, or runtime behavior look like? Syntax sketches and IR fragments welcome.
      render: termin
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What have you tried or thought about? Why doesn't the current Termin surface cover this case?
    validations:
      required: false

  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      description: Read before submitting.
      options:
        - label: This does not require making the DSL Turing-complete or generally more expressive.
          required: true
        - label: This does not bypass access control, state enforcement, or audit logging.
          required: true
        - label: I have read the [roadmap](https://termin.dev/roadmap/) and this is not already planned.
          required: true
