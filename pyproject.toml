[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "strict"

[tool.coverage.run]
source = ["termin", "termin_runtime"]

[tool.coverage.report]
fail_under = 69
show_missing = true
skip_empty = true
exclude_lines = [
    "pragma: no cover",
    "if __name__ ==",
    "raise NotImplementedError",
]

# Measure compiler and runtime separately:
#   Compiler only:    python -m pytest tests/ --cov=termin --cov-report=term-missing
#   Runtime only:     python -m pytest tests/ --cov=termin_runtime --cov-report=term-missing
#   Conformance only: cd ../termin-conformance && python -m pytest tests/ --cov=termin_runtime
#
# Current coverage (April 2026):
#   Compiler (termin/):        89%  — target 95% by v0.7
#   Runtime (termin_runtime/): 73%  — target 85% by v0.7, 95% by v1.0
#   Conformance → runtime:    63%  — the HTTP-accessible contract
#   v0.6 new code:            95.2%
